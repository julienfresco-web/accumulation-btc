name: Aggiorna dati on-chain

on:
  schedule:
    - cron: "10 6,14,22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  aggiorna:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Esegui aggiornamento
        run: python aggiorna_dati.py

      - name: Commit e push se cambiato
        run: |
          git config user.name "bot-dati"
          git config user.email "actions@github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "Aggiornamento dati on-chain [skip ci]"
          git push
