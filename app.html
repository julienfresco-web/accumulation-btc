<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BTCQuant — Console di analisi del ciclo Bitcoin</title><!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BTCQuant — Console di analisi del ciclo Bitcoin</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; }
  input[type=number]::-webkit-inner-spin-button { opacity: 1; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">

const { useState, useMemo } = React;

const COLORS = {
  bgDeep: "#0A1420", bgPanel: "#101B2D", bgPanelAlt: "#0D1826", border: "#1E2E42",
  ink: "#F5F9FD", muted: "#B0BECD", mutedDim: "#8494A7",
  amber: "#D8A34E", teal: "#4FB6A8", tealBright: "#8FE3D2", coral: "#C1543D", slate: "#2C3E52", violet: "#9B8FD9", btcOrange: "#F7931A", btcOrangeDark: "#4A1B0C",
};

function CheckIcon({ color }) {
  return (
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2">
      <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
      <polyline points="22 4 12 14.01 9 11.01" />
    </svg>
  );
}
function CircleIcon({ color }) {
  return <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2"><circle cx="12" cy="12" r="10" /></svg>;
}

function Gauge({ mvrvZ }) {
  const MIN = -2, MAX = 10, BREAK1 = 1, BREAK2 = 3.5, PCT_B1 = 25, PCT_B2 = 22;
  const safeZ = isNaN(mvrvZ) ? 0 : mvrvZ;
  const clamped = Math.max(MIN, Math.min(MAX, safeZ));
  // Scala a 3 tratti: -2..1 usa il 75% dell'altezza (zona più osservata, alta risoluzione).
  // 1..3.5 e 3.5..10 si dividono il resto — 1..3.5 è invisibile perché stesso colore di "Neutro/espansione",
  // quindi comprimerlo qui non costa nulla in leggibilità e libera spazio per Rischio elevato/Euforia (22% vs 10.8% di prima).
  const pctFromTop =
    clamped <= BREAK1 ? 100 - ((clamped - MIN) / (BREAK1 - MIN)) * (100 - PCT_B1) :
    clamped <= BREAK2 ? PCT_B1 - ((clamped - BREAK1) / (BREAK2 - BREAK1)) * (PCT_B1 - PCT_B2) :
    PCT_B2 - ((clamped - BREAK2) / (MAX - BREAK2)) * PCT_B2;
  const bands = [
    { top: 0, bottom: 11.846, label: "Euforia · top ciclo", sub: "Z > 6.5", color: COLORS.coral },
    { top: 11.846, bottom: 22, label: "Rischio elevato", sub: "3.5 – 6.5", color: "#8A5A3A" },
    { top: 22, bottom: 50, label: "Neutro / espansione", sub: "0 – 3.5", color: COLORS.slate },
    { top: 50, bottom: 75, label: "Opportunità", sub: "< 0", color: COLORS.amber },
    { top: 75, bottom: 100, label: "Opportunità", sub: "< 0", color: "#B8752A" },
  ];
  const legendBands = bands.filter((_, i) => i !== 4);
  // Arco semicircolare: 0% = Accumulo (estremo sinistro), 100% = Euforia (estremo destro).
  // "top"/"bottom" restano quelli calcolati sopra (convenzione Euforia-in-alto); qui li
  // convertiamo in angoli 180°→360° (sinistra→sopra→destra) con lo stesso raggio per tutte le fasce.
  const cx = 130, cy = 120, r = 98, sw = 20;
  const angleFor = (posPct) => 180 + (posPct / 100) * 180;
  const polar = (angleDeg) => {
    const rad = (angleDeg * Math.PI) / 180;
    return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
  };
  const markerPt = polar(angleFor(100 - pctFromTop));
  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center" }}>
      <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "10px", color: COLORS.ink, fontFamily: "'Space Grotesk', sans-serif", fontSize: "14px", fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.02em" }}>
        ⚓ Profondità di ciclo
      </div>
      <svg viewBox="0 0 260 145" style={{ width: "100%", maxWidth: "260px", display: "block" }}>
        {bands.map((b, i) => {
          const s = polar(angleFor(100 - b.bottom));
          const e = polar(angleFor(100 - b.top));
          return <path key={i} d={`M ${s.x} ${s.y} A ${r} ${r} 0 0 1 ${e.x} ${e.y}`} fill="none" stroke={b.color} strokeWidth={sw} opacity={0.9} strokeLinecap="butt" />;
        })}
        <g transform={`translate(${markerPt.x},${markerPt.y})`}>
          <rect x={-12} y={-12} width={24} height={24} fill={COLORS.btcOrange} stroke={COLORS.bgDeep} strokeWidth={3.5} transform="rotate(45)" />
          <text x={0} y={1} textAnchor="middle" dominantBaseline="central" fontSize={12} fontWeight="700" fill={COLORS.btcOrangeDark} fontFamily="'Space Grotesk', sans-serif">₿</text>
        </g>
      </svg>
      <div style={{ marginTop: "8px", display: "flex", flexDirection: "column", gap: "6px", width: "100%", maxWidth: "260px" }}>
        {legendBands.map((b, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", fontSize: "12px" }}>
            <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
              <div style={{ width: "8px", height: "8px", backgroundColor: b.color, borderRadius: "2px" }} />
              <span style={{ color: COLORS.muted, fontFamily: "'Inter', sans-serif" }}>{b.label}</span>
            </div>
            <span style={{ color: COLORS.mutedDim, fontFamily: "'IBM Plex Mono', monospace" }}>{b.sub}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function LockedRow({ label, value, unit, pass, thresholdLabel, decimals, badge }) {
  const display = value === null || value === undefined ? "—" : typeof value === "number" ? value.toFixed(decimals ?? 4) : value;
  const badgeLabel = badge || "AUTO";
  const isManual = badgeLabel === "MANUALE";
  const isStima = badgeLabel === "STIMA";
  const badgeColor = isManual ? COLORS.amber : isStima ? COLORS.violet : COLORS.tealBright;
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: "8px", padding: "12px 16px", borderBottom: `1px solid ${COLORS.border}` }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
          <span style={{ color: COLORS.ink, fontFamily: "'Inter', sans-serif", fontSize: "14px", fontWeight: 500 }}>{label}</span>
          <span style={{ backgroundColor: `${badgeColor}26`, color: badgeColor, fontFamily: "'IBM Plex Mono', monospace", fontSize: "9px", fontWeight: 700, padding: "2px 6px", borderRadius: "4px", letterSpacing: "0.05em" }}>{badgeLabel}</span>
        </div>
        {pass !== undefined && (
          <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>
            {pass ? <CheckIcon color={COLORS.tealBright} /> : <CircleIcon color={COLORS.mutedDim} />}
            <span style={{ color: pass ? COLORS.tealBright : COLORS.mutedDim, fontFamily: "'IBM Plex Mono', monospace", fontSize: "12px" }}>
              {pass ? "soglia raggiunta" : "sopra soglia"}
            </span>
          </div>
        )}
      </div>
      <div style={{ display: "flex", alignItems: "center", gap: "12px" }}>
        <div style={{ backgroundColor: COLORS.bgDeep, border: `1px solid ${COLORS.border}`, color: COLORS.ink, fontFamily: "'IBM Plex Mono', monospace", padding: "6px 10px", borderRadius: "4px", fontSize: "14px", minWidth: "100px" }}>
          {display}
        </div>
        <span style={{ color: COLORS.mutedDim, fontFamily: "'IBM Plex Mono', monospace", fontSize: "12px" }}>{unit}</span>
        <span style={{ color: COLORS.mutedDim, fontFamily: "'Inter', sans-serif", fontSize: "12px", marginLeft: "auto" }}>{thresholdLabel}</span>
      </div>
    </div>
  );
}

function IndicatorRow({ label, value, onChange, unit, pass, thresholdLabel, step }) {
  const showBadge = pass !== undefined;
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: "8px", padding: "12px 16px", borderBottom: `1px solid ${COLORS.border}` }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <span style={{ color: COLORS.ink, fontFamily: "'Inter', sans-serif", fontSize: "14px", fontWeight: 500 }}>{label}</span>
        {showBadge && (
          <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>
            {pass ? <CheckIcon color={COLORS.tealBright} /> : <CircleIcon color={COLORS.mutedDim} />}
            <span style={{ color: pass ? COLORS.tealBright : COLORS.mutedDim, fontFamily: "'IBM Plex Mono', monospace", fontSize: "12px" }}>
              {pass ? "soglia raggiunta" : "sopra soglia"}
            </span>
          </div>
        )}
      </div>
      <div style={{ display: "flex", alignItems: "center", gap: "12px" }}>
        <input
          type="number" step={step || "0.01"} value={value}
          onChange={(e) => { const v = parseFloat(e.target.value); onChange(isNaN(v) ? 0 : v); }}
          style={{ backgroundColor: COLORS.bgDeep, border: `1px solid ${COLORS.border}`, color: COLORS.ink, fontFamily: "'IBM Plex Mono', monospace", width: "112px", padding: "6px 8px", borderRadius: "4px", fontSize: "14px", outline: "none" }}
        />
        <span style={{ color: COLORS.mutedDim, fontFamily: "'IBM Plex Mono', monospace", fontSize: "12px" }}>{unit}</span>
        <span style={{ color: COLORS.mutedDim, fontFamily: "'Inter', sans-serif", fontSize: "12px", marginLeft: "auto" }}>{thresholdLabel}</span>
      </div>
    </div>
  );
}

function TrafficLight({ label, state, detail }) {
  const colors = { green: COLORS.tealBright, orange: COLORS.amber, red: COLORS.coral };
  const glow = { green: "rgba(143,227,210,0.55)", orange: "rgba(216,163,78,0.45)", red: "rgba(193,84,61,0.4)" };
  return (
    <div style={{ display: "flex", alignItems: "center", gap: "12px", padding: "10px 4px" }}>
      <div style={{ width: "16px", height: "16px", borderRadius: "50%", backgroundColor: colors[state], boxShadow: `0 0 10px 2px ${glow[state]}`, flexShrink: 0 }} />
      <div style={{ display: "flex", flexDirection: "column" }}>
        <span style={{ color: COLORS.ink, fontFamily: "'Inter', sans-serif", fontSize: "13px", fontWeight: 500 }}>{label}</span>
        {detail && <span style={{ color: COLORS.mutedDim, fontFamily: "'IBM Plex Mono', monospace", fontSize: "11px" }}>{detail}</span>}
      </div>
    </div>
  );
}

function StageCard({ number, title, capitalPct, active, conditions }) {
  return (
    <div style={{ flex: 1, borderRadius: "8px", padding: "16px", display: "flex", flexDirection: "column", gap: "12px", backgroundColor: active ? "rgba(79,182,168,0.10)" : COLORS.bgPanelAlt, border: active ? `1px solid ${COLORS.teal}` : `1px solid ${COLORS.border}` }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <span style={{ fontFamily: "'Space Grotesk', sans-serif", color: active ? COLORS.tealBright : COLORS.muted, fontSize: "12px", fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.03em" }}>Stadio {number}</span>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", color: active ? COLORS.tealBright : COLORS.mutedDim, fontSize: "12px" }}>{capitalPct}% scenario</span>
      </div>
      <span style={{ color: COLORS.ink, fontFamily: "'Inter', sans-serif", fontSize: "14px", fontWeight: 500 }}>{title}</span>
      <div style={{ display: "flex", flexDirection: "column", gap: "6px" }}>
        {conditions.map((c, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", gap: "6px" }}>
            {c.met ? <CheckIcon color={COLORS.tealBright} /> : <CircleIcon color={COLORS.mutedDim} />}
            <span style={{ color: c.met ? COLORS.ink : COLORS.mutedDim, fontFamily: "'Inter', sans-serif", fontSize: "12px" }}>{c.label}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function AccumulationConsole() {
  const [mvrvZ, setMvrvZ] = useState(0.21);
  const [puell, setPuell] = useState(0.75);
  const [reserveRisk, setReserveRisk] = useState(0.006);
  const [zvwap, setZvwap] = useState(-0.68);
  const [soprLth, setSoprLth] = useState(1.05);
  const [sthLthGap, setSthLthGap] = useState(0.3);
  const [soprSustained, setSoprSustained] = useState(false);
  const [btcPrice, setBtcPrice] = useState(61500);
  const [minerCost, setMinerCost] = useState(37856);
  const [hashRibbonCapitulation, setHashRibbonCapitulation] = useState(true);
  const [hashRibbonCrossover, setHashRibbonCrossover] = useState(false);
  const [analyzed, setAnalyzed] = useState(false);
  const [lastRun, setLastRun] = useState(null);
  const [autoData, setAutoData] = useState(null);
  const [fetchStatus, setFetchStatus] = useState("idle"); // idle | loading | success | error
  const [fetchError, setFetchError] = useState("");

  function applyData(data) {
    setAutoData(data);
    setMvrvZ(data.mvrvZ);
    setPuell(data.puell);
    setReserveRisk(data.reserveRisk);
    setSoprLth(data.sopr);
    setBtcPrice(data.price);
    setHashRibbonCapitulation(data.hashRibbonCapitulation);
    setHashRibbonCrossover(data.hashRibbonCrossover);
    if (typeof data.minerCost === "number") setMinerCost(data.minerCost);
    if (typeof data.zvwap === "number") setZvwap(data.zvwap);
    if (typeof data.sthLthGap === "number") setSthLthGap(data.sthLthGap);
    if (typeof data.soprSustained === "boolean") setSoprSustained(data.soprSustained);
  }

  // Legge data.json — un file statico, aggiornato 3 volte al giorno da GitHub Actions.
  // Nessuna chiamata API diretta dal browser: zero consumo di quota per visitatore.
  // Tutti i 12 valori della console (incluso zVWAP, gap STH/LTH, SOPR sostenuto e
  // costo minerario) sono calcolati lato server: nessun campo è editabile qui.
  function loadStaticData() {
    setFetchStatus("loading");
    setFetchError("");
    fetch("./data.json?t=" + Date.now())
      .then((r) => {
        if (!r.ok) throw new Error(`HTTP ${r.status} — data.json non trovato o non ancora generato`);
        return r.json();
      })
      .then((data) => {
        applyData(data);
        setFetchStatus("success");
      })
      .catch((e) => {
        setFetchStatus("error");
        setFetchError(e.message || "Impossibile leggere data.json.");
      });
  }

  React.useEffect(() => { loadStaticData(); }, []);

  const calc = useMemo(() => {
    const c1a = mvrvZ <= 0;
    const c1b = puell < 2.0;
    const observation = c1a && c1b;
    const c1c = hashRibbonCapitulation;
    const stage1 = observation && c1c;
    const c2a = puell < 0.5 || reserveRisk < 0.002;
    const c2b = zvwap < -1.5;
    const stage2 = stage1 && c2a && c2b;
    const c3a = sthLthGap <= 0.15;
    const c3b = soprLth <= 1.0 && soprSustained;
    const c3c = hashRibbonCrossover;
    const stage3 = stage2 && c3a && c3b && c3c;
    const activeStage = stage3 ? 4 : stage2 ? 3 : stage1 ? 2 : observation ? 1 : 0;
    const capitalPct = { 0: 0, 1: 0, 2: 20, 3: 50, 4: 100 }[activeStage];

    const belowCost = btcPrice < minerCost;
    const minerStructuralSignal = belowCost && hashRibbonCrossover
      ? "strong"
      : belowCost && hashRibbonCapitulation
      ? "watch"
      : "none";

    const lights = [
      { label: "Zona di opportunità (Z ≤ 0 e Puell < 2)", state: observation ? "green" : (c1a || c1b) ? "orange" : "red" },
      { label: "Capitolazione mineraria confermata", state: hashRibbonCapitulation ? "green" : belowCost ? "orange" : "red" },
      { label: "Stress minerario profondo (Puell < 0.5)", state: puell < 0.5 ? "green" : puell < 1.0 ? "orange" : "red" },
      { label: "zVWAP estremo (< -1.5)", state: zvwap < -1.5 ? "green" : zvwap < -0.5 ? "orange" : "red" },
      { label: "Crossover di recupero confermato", state: hashRibbonCrossover ? "green" : hashRibbonCapitulation ? "orange" : "red" },
      { label: "Conferma finale (convergenza + SOPR sostenuto)", state: (c3a && c3b) ? "green" : (c3a || c3b) ? "orange" : "red" },
    ];
    const allGreen = lights.every(l => l.state === "green");

    return { c1a, c1b, c1c, observation, stage1, c2a, c2b, stage2, c3a, c3b, c3c, stage3, activeStage, capitalPct, belowCost, minerStructuralSignal, lights, allGreen };
  }, [mvrvZ, puell, reserveRisk, zvwap, soprLth, sthLthGap, soprSustained, btcPrice, minerCost, hashRibbonCapitulation, hashRibbonCrossover]);

  const minerSignalCopy = {
    strong: { label: "Lettura forte — capitolazione mineraria conclusa, prezzo sotto costo", color: COLORS.tealBright },
    watch: { label: "Capitolazione mineraria in corso — attendi il crossover Hash Ribbon", color: COLORS.amber },
    none: { label: "Nessuno stress strutturale sui miner al momento", color: COLORS.mutedDim },
  };

  const stageLabels = {
    0: "Nessuna condizione di scenario attiva",
    1: "Scenario di opportunità — condizioni preliminari soddisfatte",
    2: "Scenario 1 — capitolazione mineraria confermata",
    3: "Scenario 2 — stress minerario profondo",
    4: "Scenario 3 — capitolazione completa confermata",
  };

  return (
    <div style={{ backgroundColor: COLORS.bgDeep, minHeight: "100vh", fontFamily: "'Inter', sans-serif", width: "100%", paddingBottom: "64px" }}>
      <div style={{ padding: "32px 24px 24px", maxWidth: "1000px", margin: "0 auto" }}>
        <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "4px" }}>
          <div style={{ width: "6px", height: "6px", backgroundColor: COLORS.tealBright, borderRadius: "1px" }} />
          <span style={{ color: COLORS.mutedDim, fontFamily: "'IBM Plex Mono', monospace", fontSize: "12px", textTransform: "uppercase", letterSpacing: "0.1em" }}>On-chain · BTC</span>
        </div>
        <h1 style={{ color: COLORS.ink, fontFamily: "'Space Grotesk', sans-serif", fontSize: "28px", fontWeight: 700, margin: "4px 0" }}>BTCQuant</h1>
      </div>

      <div style={{ padding: "0 24px", maxWidth: "1000px", margin: "0 auto 20px" }}>
        <div style={{ borderRadius: "8px", padding: "16px", backgroundColor: COLORS.bgPanel, border: `1px solid ${COLORS.border}` }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: "12px" }}>
            <span style={{ color: COLORS.mutedDim, fontFamily: "'IBM Plex Mono', monospace", fontSize: "11px" }}>
              Dati aggiornati automaticamente 3 volte al giorno — nessuna azione richiesta
            </span>
            <button onClick={loadStaticData} disabled={fetchStatus === "loading"}
              style={{ backgroundColor: fetchStatus === "loading" ? COLORS.bgDeep : COLORS.teal, color: fetchStatus === "loading" ? COLORS.mutedDim : COLORS.bgDeep, border: "none", borderRadius: "6px", padding: "10px 18px", fontFamily: "'Space Grotesk', sans-serif", fontWeight: 700, fontSize: "13px", cursor: fetchStatus === "loading" ? "default" : "pointer" }}>
              {fetchStatus === "loading" ? "Carico..." : "🔄 Ricarica vista"}
            </button>
          </div>
          {fetchStatus === "success" && autoData && (
            <div style={{ marginTop: "10px", color: COLORS.tealBright, fontFamily: "'IBM Plex Mono', monospace", fontSize: "11px" }}>
              ✓ Ultimo aggiornamento dati: {new Date(autoData.aggiornato || autoData.fetchedAt).toLocaleString("it-IT")}
            </div>
          )}

          {fetchStatus === "error" && (
            <div style={{ marginTop: "10px", color: COLORS.coral, fontFamily: "'Inter', sans-serif", fontSize: "12px" }}>
              ⚠ {fetchError}. Se il sito è appena stato pubblicato, il primo aggiornamento programmato potrebbe non essere ancora avvenuto — puoi lanciarlo manualmente da GitHub → Actions → "Aggiorna dati console BTC" → Run workflow.
            </div>
          )}
          {fetchStatus === "loading" && (
            <div style={{ marginTop: "10px", color: COLORS.mutedDim, fontFamily: "'Inter', sans-serif", fontSize: "12px" }}>
              Caricamento in corso...
            </div>
          )}
        </div>
      </div>

      <div style={{ padding: "0 24px", maxWidth: "1000px", margin: "0 auto", display: "grid", gridTemplateColumns: window.innerWidth > 1024 ? "280px 1fr" : "1fr", gap: "24px" }}>
        <div style={{ borderRadius: "8px", padding: "24px", display: "flex", justifyContent: "center", backgroundColor: COLORS.bgPanel, border: `1px solid ${COLORS.border}` }}>
          <Gauge mvrvZ={mvrvZ} />
        </div>

        <div style={{ borderRadius: "8px", overflow: "hidden", backgroundColor: COLORS.bgPanel, border: `1px solid ${COLORS.border}` }}>
          <div style={{ padding: "16px 16px 8px" }}>
            <span style={{ fontFamily: "'Space Grotesk', sans-serif", color: COLORS.ink, fontSize: "14px", fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.03em" }}>Letture attuali</span>
          </div>
          <LockedRow label="MVRV Z-Score" value={mvrvZ} unit="score" pass={calc.c1a} thresholdLabel="soglia: ≤ 0" decimals={4} />
          <LockedRow label="Puell Multiple" value={puell} unit="×" pass={calc.c1b} thresholdLabel="attenzione: < 2.0 · confermato: < 0.5" decimals={4} />
          <LockedRow label="Reserve Risk" value={reserveRisk} unit="ratio" pass={reserveRisk < 0.002} thresholdLabel="soglia: < 0.002" decimals={7} />
          <LockedRow label="zVWAP (ancorato a max ciclo)" value={zvwap} unit="σ" pass={calc.c2b} thresholdLabel="soglia: < -1.5" decimals={2} badge="STIMA" />
          <LockedRow label="SOPR (aggregato)" value={soprLth} unit="ratio" pass={soprLth <= 1.0} thresholdLabel="soglia: ≤ 1.0" decimals={4} />

      return (
        <div style={{ backgroundColor: COLORS.bgDeep, minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: "24px", fontFamily: "'Inter', sans-serif" }}>
          <div style={{ backgroundColor: COLORS.bgPanel, border: `1px solid ${COLORS.border}`, borderRadius: "10px", padding: "32px", maxWidth: "420px", width: "100%" }}>
            <h1 style={{ color: COLORS.ink, fontFamily: "'Space Grotesk', sans-serif", fontSize: "22px", fontWeight: 700, margin: "0 0 6px" }}>Accesso non ancora attivo</h1>
            <p style={{ color: COLORS.muted, fontSize: "13px", lineHeight: 1.6, marginBottom: "8px" }}>
              Sei entrato come <span style={{ color: COLORS.tealBright, fontFamily: "'IBM Plex Mono', monospace" }}>{session.user.email}</span>, ma non risulta ancora un acquisto associato a questa email.
            </p>
            <p style={{ color: COLORS.mutedDim, fontSize: "12px", lineHeight: 1.6, marginBottom: "20px" }}>
              Se hai già acquistato, assicurati di aver usato la <strong style={{ color: COLORS.muted }}>stessa email</strong> nel pagamento. L'attivazione dopo il pagamento è automatica e richiede al massimo un paio di minuti.
            </p>
            <a href={PAYMENT_LINK} target="_blank" rel="noopener noreferrer"
              style={{ display: "block", textAlign: "center", backgroundColor: COLORS.teal, color: COLORS.bgDeep, borderRadius: "6px", padding: "12px", fontFamily: "'Space Grotesk', sans-serif", fontWeight: 700, fontSize: "14px", textDecoration: "none", marginBottom: "10px" }}>
              Acquista l'accesso
            </a>
            <button onClick={() => checkPaid(session)}
              style={{ width: "100%", backgroundColor: COLORS.bgDeep, color: COLORS.tealBright, border: `1px solid ${COLORS.teal}`, borderRadius: "6px", padding: "12px", fontFamily: "'Space Grotesk', sans-serif", fontWeight: 700, fontSize: "14px", cursor: "pointer", marginBottom: "10px" }}>

            <button onClick={handleLogout}
              style={{ width: "100%", backgroundColor: "transparent", color: COLORS.mutedDim, border: "none", padding: "8px", fontFamily: "'Inter', sans-serif", fontSize: "12px", cursor: "pointer" }}>

    // ---- 4. Pagamento verificato: mostra la console ----

      <div>
        <div style={{ position: "fixed", top: 0, right: 0, zIndex: 20, padding: "12px 16px" }}>
          <button onClick={() => setMenuAperto(!menuAperto)} aria-label="Menu" style={{ width: "36px", height: "36px", backgroundColor: COLORS.bgPanel, color: COLORS.ink, border: `1px solid ${COLORS.border}`, borderRadius: "8px", cursor: "pointer", fontSize: "16px", display: "flex", alignItems: "center", justifyContent: "center" }}>

              <button onClick={() => { setPannello("metriche"); setMenuAperto(false); }} style={{ display: "block", width: "100%", textAlign: "left", padding: "12px 16px", backgroundColor: "transparent", color: COLORS.ink, border: "none", borderBottom: `1px solid ${COLORS.border}`, fontFamily: "'Inter', sans-serif", fontSize: "14px", cursor: "pointer" }}>

              <button onClick={() => { setPannello("grafico"); setMenuAperto(false); }} style={{ display: "block", width: "100%", textAlign: "left", padding: "12px 16px", backgroundColor: "transparent", color: COLORS.ink, border: "none", borderBottom: `1px solid ${COLORS.border}`, fontFamily: "'Inter', sans-serif", fontSize: "14px", cursor: "pointer" }}>

                </span>
                <button onClick={() => setPannello(null)} style={{ background: "none", border: "none", color: COLORS.mutedDim, fontSize: "20px", cursor: "pointer" }}>✕</button>

              {pannello === "metriche" && (

              {pannello === "backtest" && (

                    ))}
                  </div>
                </div>
              )}

              {pannello === "grafico" && (
                <div>
                  <p style={{ color: COLORS.mutedDim, fontSize: "12px", marginBottom: "16px", lineHeight: 1.6 }}>
                    Grafico live fornito da TradingView — nessun dato aggiuntivo raccolto da BTCQuant.

                  <div id="tv-chart-container" style={{ height: "440px", borderRadius: "8px", overflow: "hidden" }} />
                </div>

              {pannello === "impostazioni" && (
                <div>
                  <div style={{ marginBottom: "22px" }}>
                    <div style={{ color: COLORS.mutedDim, fontFamily: "'IBM Plex Mono', monospace", fontSize: "11px", marginBottom: "4px" }}>EMAIL ATTUALE</div>
                    <div style={{ color: COLORS.ink, fontFamily: "'IBM Plex Mono', monospace", fontSize: "14px" }}>{session.user.email}</div>
                  </div>
                  <div style={{ color: COLORS.ink, fontFamily: "'Space Grotesk', sans-serif", fontSize: "14px", fontWeight: 700, marginBottom: "8px" }}>
                    Cambia email di accesso
                  </div>
                  <p style={{ color: COLORS.mutedDim, fontSize: "12px", marginBottom: "12px", lineHeight: 1.6 }}>

                  </p>
                  <input type="email" value={newEmail} onChange={(e) => setNewEmail(e.target.value)} placeholder="nuova@email.com"
                    style={{ width: "100%", backgroundColor: COLORS.bgDeep, border: `1px solid ${COLORS.border}`, borderRadius: "6px", padding: "10px 12px", color: COLORS.ink, fontFamily: "'IBM Plex Mono', monospace", fontSize: "14px", outline: "none", marginBottom: "10px" }} />
                  <button onClick={handleCambiaEmail} disabled={emailChangeStatus === "sending"}
                    style={{ backgroundColor: COLORS.teal, color: COLORS.bgDeep, border: "none", borderRadius: "6px", padding: "10px 18px", fontFamily: "'Space Grotesk', sans-serif", fontWeight: 700, fontSize: "13px", cursor: "pointer" }}>
                    {emailChangeStatus === "sending" ? "Invio..." : "Invia conferma"}
                  </button>
                  {emailChangeStatus === "sent" && (
                    <p style={{ color: COLORS.tealBright, fontSize: "12.5px", marginTop: "12px", lineHeight: 1.6 }}>
                      ✓ Controlla la casella {newEmail}: conferma il cambio dal link ricevuto, poi accedi di nuovo con la nuova email.
                    </p>
                  )}
                  {emailChangeStatus === "error" && (
                    <p style={{ color: COLORS.coral, fontSize: "12.5px", marginTop: "12px" }}>⚠ {emailChangeError}</p>
                  )}
                </div>
              )}
            </div>
          </div>
        )}
        <AccumulationConsole />
      </div>
    );
  }

  return (
    <div style={{ backgroundColor: COLORS.bgDeep, minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: "24px", fontFamily: "'Inter', sans-serif" }}>
      <div style={{ backgroundColor: COLORS.bgPanel, border: `1px solid ${COLORS.border}`, borderRadius: "10px", padding: "32px", maxWidth: "380px", width: "100%" }}>
        <h1 style={{ color: COLORS.ink, fontFamily: "'Space Grotesk', sans-serif", fontSize: "22px", fontWeight: 700, margin: "0 0 6px" }}>Accesso Console</h1>
        <p style={{ color: COLORS.muted, fontSize: "13px", marginBottom: "20px" }}>
          {otpSent ? "Inserisci il codice a 6 cifre ricevuto via email." : "Inserisci l'email associata al tuo acquisto."}
        </p>

        {!otpSent ? (
          <>
            <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} placeholder="tuaemail@esempio.com"
              style={{ width: "100%", backgroundColor: COLORS.bgDeep, border: `1px solid ${COLORS.border}`, borderRadius: "6px", padding: "10px 12px", color: COLORS.ink, fontFamily: "'IBM Plex Mono', monospace", fontSize: "14px", outline: "none", marginBottom: "12px" }} />
            <button onClick={handleSendOtp} disabled={loading}
              style={{ width: "100%", backgroundColor: COLORS.teal, color: COLORS.bgDeep, border: "none", borderRadius: "6px", padding: "12px", fontFamily: "'Space Grotesk', sans-serif", fontWeight: 700, fontSize: "14px", cursor: "pointer" }}>
              {loading ? "Invio..." : "Invia codice"}
            </button>
          </>
        ) : (
          <>
            <input type="text" inputMode="numeric" value={otpCode} onChange={(e) => setOtpCode(e.target.value)} placeholder="123456" maxLength={6}
              style={{ width: "100%", backgroundColor: COLORS.bgDeep, border: `1px solid ${COLORS.border}`, borderRadius: "6px", padding: "10px 12px", color: COLORS.ink, fontFamily: "'IBM Plex Mono', monospace", fontSize: "18px", letterSpacing: "0.3em", textAlign: "center", outline: "none", marginBottom: "12px" }} />
            <button onClick={handleVerifyOtp} disabled={loading}
              style={{ width: "100%", backgroundColor: COLORS.teal, color: COLORS.bgDeep, border: "none", borderRadius: "6px", padding: "12px", fontFamily: "'Space Grotesk', sans-serif", fontWeight: 700, fontSize: "14px", cursor: "pointer", marginBottom: "8px" }}>
              {loading ? "Verifico..." : "Verifica ed entra"}
            </button>
            <button onClick={() => { setOtpSent(false); setOtpCode(""); }}
              style={{ width: "100%", backgroundColor: "transparent", color: COLORS.mutedDim, border: "none", padding: "8px", fontFamily: "'Inter', sans-serif", fontSize: "12px", cursor: "pointer" }}>
              ← usa un'altra email
            </button>
          </>
        )}

        {error && <p style={{ color: COLORS.coral, fontSize: "12px", marginTop: "12px" }}>{error}</p>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<><CookieBanner /><AuthGate /></>);
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">

const { useState, useMemo } = React;

const COLORS = {
  bgDeep: "#0A1420", bgPanel: "#101B2D", bgPanelAlt: "#0D1826", border: "#1E2E42",
  ink: "#F5F9FD", muted: "#B0BECD", mutedDim: "#8494A7",
  amber: "#D8A34E", teal: "#4FB6A8", tealBright: "#8FE3D2", coral: "#C1543D", slate: "#2C3E52", violet: "#9B8FD9", btcOrange: "#F7931A", btcOrangeDark: "#4A1B0C",
};

function CheckIcon({ color }) {
  return (
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2">
      <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
      <polyline points="22 4 12 14.01 9 11.01" />
    </svg>
  );
}
function CircleIcon({ color }) {
  return <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2"><circle cx="12" cy="12" r="10" /></svg>;
}

function Gauge({ mvrvZ }) {
  const MIN = -2, MAX = 10, BREAK1 = 1, BREAK2 = 3.5, PCT_B1 = 25, PCT_B2 = 22;
  const safeZ = isNaN(mvrvZ) ? 0 : mvrvZ;
  const clamped = Math.max(MIN, Math.min(MAX, safeZ));
  // Scala a 3 tratti: -2..1 usa il 75% dell'altezza (zona più osservata, alta risoluzione).
  // 1..3.5 e 3.5..10 si dividono il resto — 1..3.5 è invisibile perché stesso colore di "Neutro/espansione",
  // quindi comprimerlo qui non costa nulla in leggibilità e libera spazio per Rischio elevato/Euforia (22% vs 10.8% di prima).
  const pctFromTop =
    clamped <= BREAK1 ? 100 - ((clamped - MIN) / (BREAK1 - MIN)) * (100 - PCT_B1) :
    clamped <= BREAK2 ? PCT_B1 - ((clamped - BREAK1) / (BREAK2 - BREAK1)) * (PCT_B1 - PCT_B2) :
    PCT_B2 - ((clamped - BREAK2) / (MAX - BREAK2)) * PCT_B2;
  const bands = [
    { top: 0, bottom: 11.846, label: "Euforia · top ciclo", sub: "Z > 6.5", color: COLORS.coral },
    { top: 11.846, bottom: 22, label: "Rischio elevato", sub: "3.5 – 6.5", color: "#8A5A3A" },
    { top: 22, bottom: 50, label: "Neutro / espansione", sub: "0 – 3.5", color: COLORS.slate },
    { top: 50, bottom: 75, label: "Opportunità", sub: "< 0", color: COLORS.amber },
    { top: 75, bottom: 100, label: "Opportunità", sub: "< 0", color: "#B8752A" },
  ];
  const legendBands = bands.filter((_, i) => i !== 4);
  // Arco semicircolare: 0% = Accumulo (estremo sinistro), 100% = Euforia (estremo destro).
  // "top"/"bottom" restano quelli calcolati sopra (convenzione Euforia-in-alto); qui li
  // convertiamo in angoli 180°→360° (sinistra→sopra→destra) con lo stesso raggio per tutte le fasce.
  const cx = 130, cy = 120, r = 98, sw = 20;
  const angleFor = (posPct) => 180 + (posPct / 100) * 180;
  const polar = (angleDeg) => {
    const rad = (angleDeg * Math.PI) / 180;
    return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
  };
  const markerPt = polar(angleFor(100 - pctFromTop));
  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center" }}>
      <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "10px", color: COLORS.ink, fontFamily: "'Space Grotesk', sans-serif", fontSize: "14px", fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.02em" }}>
        ⚓ Profondità di ciclo
      </div>
      <svg viewBox="0 0 260 145" style={{ width: "100%", maxWidth: "260px", display: "block" }}>
        {bands.map((b, i) => {
          const s = polar(angleFor(100 - b.bottom));
          const e = polar(angleFor(100 - b.top));
          return <path key={i} d={`M ${s.x} ${s.y} A ${r} ${r} 0 0 1 ${e.x} ${e.y}`} fill="none" stroke={b.color} strokeWidth={sw} opacity={0.9} strokeLinecap="butt" />;
        })}
        <g transform={`translate(${markerPt.x},${markerPt.y})`}>
          <rect x={-12} y={-12} width={24} height={24} fill={COLORS.btcOrange} stroke={COLORS.bgDeep} strokeWidth={3.5} transform="rotate(45)" />
          <text x={0} y={1} textAnchor="middle" dominantBaseline="central" fontSize={12} fontWeight="700" fill={COLORS.btcOrangeDark} fontFamily="'Space Grotesk', sans-serif">₿</text>
        </g>
      </svg>
      <div style={{ marginTop: "8px", display: "flex", flexDirection: "column", gap: "6px", width: "100%", maxWidth: "260px" }}>
        {legendBands.map((b, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", fontSize: "12px" }}>
            <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
              <div style={{ width: "8px", height: "8px", backgroundColor: b.color, borderRadius: "2px" }} />
              <span style={{ color: COLORS.muted, fontFamily: "'Inter', sans-serif" }}>{b.label}</span>
            </div>
            <span style={{ color: COLORS.mutedDim, fontFamily: "'IBM Plex Mono', monospace" }}>{b.sub}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function LockedRow({ label, value, unit, pass, thresholdLabel, decimals, badge }) {
  const display = value === null || value === undefined ? "—" : typeof value === "number" ? value.toFixed(decimals ?? 4) : value;
  const badgeLabel = badge || "AUTO";
  const isManual = badgeLabel === "MANUALE";
  const isStima = badgeLabel === "STIMA";
  const badgeColor = isManual ? COLORS.amber : isStima ? COLORS.violet : COLORS.tealBright;
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: "8px", padding: "12px 16px", borderBottom: `1px solid ${COLORS.border}` }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
          <span style={{ color: COLORS.ink, fontFamily: "'Inter', sans-serif", fontSize: "14px", fontWeight: 500 }}>{label}</span>
          <span style={{ backgroundColor: `${badgeColor}26`, color: badgeColor, fontFamily: "'IBM Plex Mono', monospace", fontSize: "9px", fontWeight: 700, padding: "2px 6px", borderRadius: "4px", letterSpacing: "0.05em" }}>{badgeLabel}</span>
        </div>
        {pass !== undefined && (
          <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>
            {pass ? <CheckIcon color={COLORS.tealBright} /> : <CircleIcon color={COLORS.mutedDim} />}
            <span style={{ color: pass ? COLORS.tealBright : COLORS.mutedDim, fontFamily: "'IBM Plex Mono', monospace", fontSize: "12px" }}>
              {pass ? "soglia raggiunta" : "sopra soglia"}
            </span>
          </div>
        )}
      </div>
      <div style={{ display: "flex", alignItems: "center", gap: "12px" }}>
        <div style={{ backgroundColor: COLORS.bgDeep, border: `1px solid ${COLORS.border}`, color: COLORS.ink, fontFamily: "'IBM Plex Mono', monospace", padding: "6px 10px", borderRadius: "4px", fontSize: "14px", minWidth: "100px" }}>
          {display}
        </div>
        <span style={{ color: COLORS.mutedDim, fontFamily: "'IBM Plex Mono', monospace", fontSize: "12px" }}>{unit}</span>
        <span style={{ color: COLORS.mutedDim, fontFamily: "'Inter', sans-serif", fontSize: "12px", marginLeft: "auto" }}>{thresholdLabel}</span>
      </div>
    </div>
  );
}

function IndicatorRow({ label, value, onChange, unit, pass, thresholdLabel, step }) {
  const showBadge = pass !== undefined;
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: "8px", padding: "12px 16px", borderBottom: `1px solid ${COLORS.border}` }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <span style={{ color: COLORS.ink, fontFamily: "'Inter', sans-serif", fontSize: "14px", fontWeight: 500 }}>{label}</span>
        {showBadge && (
          <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>
            {pass ? <CheckIcon color={COLORS.tealBright} /> : <CircleIcon color={COLORS.mutedDim} />}
            <span style={{ color: pass ? COLORS.tealBright : COLORS.mutedDim, fontFamily: "'IBM Plex Mono', monospace", fontSize: "12px" }}>
              {pass ? "soglia raggiunta" : "sopra soglia"}
            </span>
          </div>
        )}
      </div>
      <div style={{ display: "flex", alignItems: "center", gap: "12px" }}>
        <input
          type="number" step={step || "0.01"} value={value}
          onChange={(e) => { const v = parseFloat(e.target.value); onChange(isNaN(v) ? 0 : v); }}
          style={{ backgroundColor: COLORS.bgDeep, border: `1px solid ${COLORS.border}`, color: COLORS.ink, fontFamily: "'IBM Plex Mono', monospace", width: "112px", padding: "6px 8px", borderRadius: "4px", fontSize: "14px", outline: "none" }}
        />

        <span style={{ color: COLORS.mutedDim, fontFamily: "'Inter', sans-serif", fontSize: "12px", marginLeft: "auto" }}>{thresholdLabel}</span>
      </div>
    </div>
  );
}

function AccumulationConsole() {
  const [mvrvZ, setMvrvZ] = useState(0.21);
  const [puell, setPuell] = useState(0.75);
  const [reserveRisk, setReserveRisk] = useState(0.006);
  const [zvwap, setZvwap] = useState(-0.68);
  const [soprLth, setSoprLth] = useState(1.05);
  const [sthLthGap, setSthLthGap] = useState(0.3);
  const [soprSustained, setSoprSustained] = useState(false);
  const [btcPrice, setBtcPrice] = useState(61500);
  const [minerCost, setMinerCost] = useState(37856);
  const [hashRibbonCapitulation, setHashRibbonCapitulation] = useState(true);
  const [hashRibbonCrossover, setHashRibbonCrossover] = useState(false);
  const [analyzed, setAnalyzed] = useState(false);
  const [lastRun, setLastRun] = useState(null);
  const [autoData, setAutoData] = useState(null);
  const [fetchStatus, setFetchStatus] = useState("idle"); // idle | loading | success | error
  const [fetchError, setFetchError] = useState("");

  function applyData(data) {
    setAutoData(data);
    setMvrvZ(data.mvrvZ);
    setPuell(data.puell);
    setReserveRisk(data.reserveRisk);
    setSoprLth(data.sopr);
    setBtcPrice(data.price);
    setHashRibbonCapitulation(data.hashRibbonCapitulation);
    setHashRibbonCrossover(data.hashRibbonCrossover);
    if (typeof data.minerCost === "number") setMinerCost(data.minerCost);
    if (typeof data.zvwap === "number") setZvwap(data.zvwap);
    if (typeof data.sthLthGap === "number") setSthLthGap(data.sthLthGap);
    if (typeof data.soprSustained === "boolean") setSoprSustained(data.soprSustained);
  }

  // Legge data.json — un file statico, aggiornato 3 volte al giorno da GitHub Actions.
  // Nessuna chiamata API diretta dal browser: zero consumo di quota per visitatore.
  // Tutti i 12 valori della console (incluso zVWAP, gap STH/LTH, SOPR sostenuto e
  // costo minerario) sono calcolati lato server: nessun campo è editabile qui.
  function loadStaticData() {
    setFetchStatus("loading");
    setFetchError("");
    fetch("./data.json?t=" + Date.now())
      .then((r) => {
        if (!r.ok) throw new Error(`HTTP ${r.status} — data.json non trovato o non ancora generato`);
        return r.json();
      })
      .then((data) => {
        applyData(data);
        setFetchStatus("success");
      })
      .catch((e) => {
        setFetchStatus("error");
        setFetchError(e.message || "Impossibile leggere data.json.");
      });
  }

  React.useEffect(() => { loadStaticData(); }, []);

  const calc = useMemo(() => {
    const c1a = mvrvZ <= 0;
    const c1b = puell < 2.0;
    const observation = c1a && c1b;
    const c1c = hashRibbonCapitulation;
    const stage1 = observation && c1c;
    const c2a = puell < 0.5 || reserveRisk < 0.002;
    const c2b = zvwap < -1.5;
    const stage2 = stage1 && c2a && c2b;
    const c3a = sthLthGap <= 0.15;
    const c3b = soprLth <= 1.0 && soprSustained;
    const c3c = hashRibbonCrossover;
    const stage3 = stage2 && c3a && c3b && c3c;
    const activeStage = stage3 ? 4 : stage2 ? 3 : stage1 ? 2 : observation ? 1 : 0;
    const capitalPct = { 0: 0, 1: 0, 2: 20, 3: 50, 4: 100 }[activeStage];

    const belowCost = btcPrice < minerCost;
    const minerStructuralSignal = belowCost && hashRibbonCrossover
      ? "strong"
      : belowCost && hashRibbonCapitulation
      ? "watch"
      : "none";

    const lights = [
      { label: "Zona di opportunità (Z ≤ 0 e Puell < 2)", state: observation ? "green" : (c1a || c1b) ? "orange" : "red" },
      { label: "Capitolazione mineraria confermata", state: hashRibbonCapitulation ? "green" : belowCost ? "orange" : "red" },
      { label: "Stress minerario profondo (Puell < 0.5)", state: puell < 0.5 ? "green" : puell < 1.0 ? "orange" : "red" },
      { label: "zVWAP estremo (< -1.5)", state: zvwap < -1.5 ? "green" : zvwap < -0.5 ? "orange" : "red" },
      { label: "Crossover di recupero confermato", state: hashRibbonCrossover ? "green" : hashRibbonCapitulation ? "orange" : "red" },
      { label: "Conferma finale (convergenza + SOPR sostenuto)", state: (c3a && c3b) ? "green" : (c3a || c3b) ? "orange" : "red" },
    ];
    const allGreen = lights.every(l => l.state === "green");

    return { c1a, c1b, c1c, observation, stage1, c2a, c2b, stage2, c3a, c3b, c3c, stage3, activeStage, capitalPct, belowCost, minerStructuralSignal, lights, allGreen };
  }, [mvrvZ, puell, reserveRisk, zvwap, soprLth, sthLthGap, soprSustained, btcPrice, minerCost, hashRibbonCapitulation, hashRibbonCrossover]);

  const minerSignalCopy = {

    watch: { label: "Capitolazione mineraria in corso — attendi il crossover Hash Ribbon", color: COLORS.amber },

  };

    4: "Scenario 3 — capitolazione completa confermata",

        <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "4px" }}>

          <span style={{ color: COLORS.mutedDim, fontFamily: "'IBM Plex Mono', monospace", fontSize: "12px", textTransform: "uppercase", letterSpacing: "0.1em" }}>On-chain · BTC</span>
        </div>

      </div>

          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: "12px" }}>
            <span style={{ color: COLORS.mutedDim, fontFamily: "'IBM Plex Mono', monospace", fontSize: "11px" }}>
              Dati aggiornati automaticamente 3 volte al giorno — nessuna azione richiesta
            </span>
            <button onClick={loadStaticData} disabled={fetchStatus === "loading"}
              style={{ backgroundColor: fetchStatus === "loading" ? COLORS.bgDeep : COLORS.teal, color: fetchStatus === "loading" ? COLORS.mutedDim : COLORS.bgDeep, border: "none", borderRadius: "6px", padding: "10px 18px", fontFamily: "'Space Grotesk', sans-serif", fontWeight: 700, fontSize: "13px", cursor: fetchStatus === "loading" ? "default" : "pointer" }}>

              ✓ Ultimo aggiornamento dati: {new Date(autoData.aggiornato || autoData.fetchedAt).toLocaleString("it-IT")}

          {fetchStatus === "error" && (
            <div style={{ marginTop: "10px", color: COLORS.coral, fontFamily: "'Inter', sans-serif", fontSize: "12px" }}>
              ⚠ {fetchError}. Se il sito è appena stato pubblicato, il primo aggiornamento programmato potrebbe non essere ancora avvenuto — puoi lanciarlo manualmente da GitHub → Actions → "Aggiorna dati console BTC" → Run workflow.
            </div>

          {fetchStatus === "loading" && (

                    style={{ width: "100%", backgroundColor: COLORS.bgDeep, border: `1px solid ${COLORS.border}`, borderRadius: "6px", padding: "10px 12px", color: COLORS.ink, fontFamily: "'IBM Plex Mono', monospace", fontSize: "14px", outline: "none", marginBottom: "10px" }} />
                  <button onClick={handleCambiaEmail} disabled={emailChangeStatus === "sending"}
                    style={{ backgroundColor: COLORS.teal, color: COLORS.bgDeep, border: "none", borderRadius: "6px", padding: "10px 18px", fontFamily: "'Space Grotesk', sans-serif", fontWeight: 700, fontSize: "13px", cursor: "pointer" }}>
                    {emailChangeStatus === "sending" ? "Invio..." : "Invia conferma"}
                  </button>
                  {emailChangeStatus === "sent" && (
                    <p style={{ color: COLORS.tealBright, fontSize: "12.5px", marginTop: "12px", lineHeight: 1.6 }}>
                      ✓ Controlla la casella {newEmail}: conferma il cambio dal link ricevuto, poi accedi di nuovo con la nuova email.
                    </p>
                  )}
                  {emailChangeStatus === "error" && (
                    <p style={{ color: COLORS.coral, fontSize: "12.5px", marginTop: "12px" }}>⚠ {emailChangeError}</p>
                  )}
                </div>
              )}
            </div>
          </div>
        )}
        <AccumulationConsole />
      </div>
    );
  }

  return (
    <div style={{ backgroundColor: COLORS.bgDeep, minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: "24px", fontFamily: "'Inter', sans-serif" }}>
      <div style={{ backgroundColor: COLORS.bgPanel, border: `1px solid ${COLORS.border}`, borderRadius: "10px", padding: "32px", maxWidth: "380px", width: "100%" }}>
        <h1 style={{ color: COLORS.ink, fontFamily: "'Space Grotesk', sans-serif", fontSize: "22px", fontWeight: 700, margin: "0 0 6px" }}>Accesso Console</h1>
        <p style={{ color: COLORS.muted, fontSize: "13px", marginBottom: "20px" }}>
          {otpSent ? "Inserisci il codice a 6 cifre ricevuto via email." : "Inserisci l'email associata al tuo acquisto."}
        </p>

        {!otpSent ? (
          <>
            <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} placeholder="tuaemail@esempio.com"
              style={{ width: "100%", backgroundColor: COLORS.bgDeep, border: `1px solid ${COLORS.border}`, borderRadius: "6px", padding: "10px 12px", color: COLORS.ink, fontFamily: "'IBM Plex Mono', monospace", fontSize: "14px", outline: "none", marginBottom: "12px" }} />
            <button onClick={handleSendOtp} disabled={loading}
              style={{ width: "100%", backgroundColor: COLORS.teal, color: COLORS.bgDeep, border: "none", borderRadius: "6px", padding: "12px", fontFamily: "'Space Grotesk', sans-serif", fontWeight: 700, fontSize: "14px", cursor: "pointer" }}>
              {loading ? "Invio..." : "Invia codice"}
            </button>
          </>
        ) : (
          <>
            <input type="text" inputMode="numeric" value={otpCode} onChange={(e) => setOtpCode(e.target.value)} placeholder="123456" maxLength={6}
              style={{ width: "100%", backgroundColor: COLORS.bgDeep, border: `1px solid ${COLORS.border}`, borderRadius: "6px", padding: "10px 12px", color: COLORS.ink, fontFamily: "'IBM Plex Mono', monospace", fontSize: "18px", letterSpacing: "0.3em", textAlign: "center", outline: "none", marginBottom: "12px" }} />
            <button onClick={handleVerifyOtp} disabled={loading}
              style={{ width: "100%", backgroundColor: COLORS.teal, color: COLORS.bgDeep, border: "none", borderRadius: "6px", padding: "12px", fontFamily: "'Space Grotesk', sans-serif", fontWeight: 700, fontSize: "14px", cursor: "pointer", marginBottom: "8px" }}>
              {loading ? "Verifico..." : "Verifica ed entra"}
            </button>
            <button onClick={() => { setOtpSent(false); setOtpCode(""); }}
              style={{ width: "100%", backgroundColor: "transparent", color: COLORS.mutedDim, border: "none", padding: "8px", fontFamily: "'Inter', sans-serif", fontSize: "12px", cursor: "pointer" }}>
              ← usa un'altra email
            </button>
          </>
        )}

        {error && <p style={{ color: COLORS.coral, fontSize: "12px", marginTop: "12px" }}>{error}</p>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<><CookieBanner /><AuthGate /></>);
</script>
</body>
</html>
