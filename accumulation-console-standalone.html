<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Console di Accumulazione — BTC On-Chain</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; }
  input[type=number]::-webkit-inner-spin-button { opacity: 1; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">

const { useState, useMemo } = React;

const COLORS = {
  bgDeep: "#0A1420", bgPanel: "#101B2D", bgPanelAlt: "#0D1826", border: "#1E2E42",
  ink: "#E7EDF3", muted: "#7C8A9C", mutedDim: "#4E5C6E",
  amber: "#D8A34E", teal: "#4FB6A8", tealBright: "#8FE3D2", coral: "#C1543D", slate: "#2C3E52",
};

function CheckIcon({ color }) {
  return (
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2">
      <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
      <polyline points="22 4 12 14.01 9 11.01" />
    </svg>
  );
}
function CircleIcon({ color }) {
  return <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2"><circle cx="12" cy="12" r="10" /></svg>;
}

function Gauge({ mvrvZ }) {
  const MIN = -2, MAX = 8;
  const clamped = Math.max(MIN, Math.min(MAX, mvrvZ));
  const pctFromTop = ((MAX - clamped) / (MAX - MIN)) * 100;
  const bands = [
    { top: 0, bottom: 15, label: "Euforia · top ciclo", sub: "Z > 6.5", color: COLORS.coral },
    { top: 15, bottom: 45, label: "Rischio elevato", sub: "3.5 – 6.5", color: "#8A5A3A" },
    { top: 45, bottom: 80, label: "Neutro / espansione", sub: "0 – 3.5", color: COLORS.slate },
    { top: 80, bottom: 90, label: "Osservazione", sub: "-1 – 0.3", color: COLORS.amber },
    { top: 90, bottom: 100, label: "Accumulo profondo", sub: "< -1", color: COLORS.teal },
  ];
  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center" }}>
      <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "16px", color: COLORS.ink, fontFamily: "'Space Grotesk', sans-serif", fontSize: "14px", fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.02em" }}>
        ⚓ Profondità di ciclo
      </div>
      <div style={{ position: "relative", width: "64px", height: "380px" }}>
        {bands.map((b, i) => (
          <div key={i} style={{ position: "absolute", left: 0, right: 0, top: `${b.top}%`, height: `${b.bottom - b.top}%`, backgroundColor: b.color, opacity: 0.85, borderTop: i === 0 ? "none" : `1px solid ${COLORS.bgDeep}` }} />
        ))}
        <div style={{ position: "absolute", left: "50%", top: `${pctFromTop}%`, transform: "translate(-50%, -50%)" }}>
          <div style={{ width: "22px", height: "22px", backgroundColor: COLORS.ink, border: `3px solid ${COLORS.bgDeep}`, borderRadius: "3px", transform: "rotate(45deg)", boxShadow: "0 0 14px 3px rgba(143,227,210,0.55)" }} />
        </div>
      </div>
      <div style={{ marginTop: "16px", display: "flex", flexDirection: "column", gap: "6px", width: "220px" }}>
        {bands.map((b, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", fontSize: "12px" }}>
            <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
              <div style={{ width: "8px", height: "8px", backgroundColor: b.color, borderRadius: "2px" }} />
              <span style={{ color: COLORS.muted, fontFamily: "'Inter', sans-serif" }}>{b.label}</span>
            </div>
            <span style={{ color: COLORS.mutedDim, fontFamily: "'IBM Plex Mono', monospace" }}>{b.sub}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function IndicatorRow({ label, value, onChange, unit, pass, thresholdLabel, step }) {
  const showBadge = pass !== undefined;
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: "8px", padding: "12px 16px", borderBottom: `1px solid ${COLORS.border}` }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <span style={{ color: COLORS.ink, fontFamily: "'Inter', sans-serif", fontSize: "14px", fontWeight: 500 }}>{label}</span>
        {showBadge && (
          <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>
            {pass ? <CheckIcon color={COLORS.tealBright} /> : <CircleIcon color={COLORS.mutedDim} />}
            <span style={{ color: pass ? COLORS.tealBright : COLORS.mutedDim, fontFamily: "'IBM Plex Mono', monospace", fontSize: "12px" }}>
              {pass ? "soglia raggiunta" : "sopra soglia"}
            </span>
          </div>
        )}
      </div>
      <div style={{ display: "flex", alignItems: "center", gap: "12px" }}>
        <input
          type="number" step={step || "0.01"} value={value}
          onChange={(e) => onChange(parseFloat(e.target.value))}
          style={{ backgroundColor: COLORS.bgDeep, border: `1px solid ${COLORS.border}`, color: COLORS.ink, fontFamily: "'IBM Plex Mono', monospace", width: "112px", padding: "6px 8px", borderRadius: "4px", fontSize: "14px", outline: "none" }}
        />
        <span style={{ color: COLORS.mutedDim, fontFamily: "'IBM Plex Mono', monospace", fontSize: "12px" }}>{unit}</span>
        <span style={{ color: COLORS.mutedDim, fontFamily: "'Inter', sans-serif", fontSize: "12px", marginLeft: "auto" }}>{thresholdLabel}</span>
      </div>
    </div>
  );
}

function TrafficLight({ label, state, detail }) {
  const colors = { green: COLORS.tealBright, orange: COLORS.amber, red: COLORS.coral };
  const glow = { green: "rgba(143,227,210,0.55)", orange: "rgba(216,163,78,0.45)", red: "rgba(193,84,61,0.4)" };
  return (
    <div style={{ display: "flex", alignItems: "center", gap: "12px", padding: "10px 4px" }}>
      <div style={{ width: "16px", height: "16px", borderRadius: "50%", backgroundColor: colors[state], boxShadow: `0 0 10px 2px ${glow[state]}`, flexShrink: 0 }} />
      <div style={{ display: "flex", flexDirection: "column" }}>
        <span style={{ color: COLORS.ink, fontFamily: "'Inter', sans-serif", fontSize: "13px", fontWeight: 500 }}>{label}</span>
        {detail && <span style={{ color: COLORS.mutedDim, fontFamily: "'IBM Plex Mono', monospace", fontSize: "11px" }}>{detail}</span>}
      </div>
    </div>
  );
}

function StageCard({ number, title, capitalPct, active, conditions }) {
  return (
    <div style={{ flex: 1, borderRadius: "8px", padding: "16px", display: "flex", flexDirection: "column", gap: "12px", backgroundColor: active ? "rgba(79,182,168,0.10)" : COLORS.bgPanelAlt, border: active ? `1px solid ${COLORS.teal}` : `1px solid ${COLORS.border}` }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <span style={{ fontFamily: "'Space Grotesk', sans-serif", color: active ? COLORS.tealBright : COLORS.muted, fontSize: "12px", fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.03em" }}>Stadio {number}</span>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", color: active ? COLORS.tealBright : COLORS.mutedDim, fontSize: "12px" }}>{capitalPct}% cap.</span>
      </div>
      <span style={{ color: COLORS.ink, fontFamily: "'Inter', sans-serif", fontSize: "14px", fontWeight: 500 }}>{title}</span>
      <div style={{ display: "flex", flexDirection: "column", gap: "6px" }}>
        {conditions.map((c, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", gap: "6px" }}>
            {c.met ? <CheckIcon color={COLORS.tealBright} /> : <CircleIcon color={COLORS.mutedDim} />}
            <span style={{ color: c.met ? COLORS.ink : COLORS.mutedDim, fontFamily: "'Inter', sans-serif", fontSize: "12px" }}>{c.label}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function AccumulationConsole() {
  const [mvrvZ, setMvrvZ] = useState(0.21);
  const [puell, setPuell] = useState(0.75);
  const [reserveRisk, setReserveRisk] = useState(0.006);
  const [zvwap, setZvwap] = useState(-0.68);
  const [soprLth, setSoprLth] = useState(1.05);
  const [sthLthGap, setSthLthGap] = useState(0.3);
  const [soprSustained, setSoprSustained] = useState(false);
  const [btcPrice, setBtcPrice] = useState(61500);
  const [minerCost, setMinerCost] = useState(37856);
  const [hashRibbonCapitulation, setHashRibbonCapitulation] = useState(true);
  const [hashRibbonCrossover, setHashRibbonCrossover] = useState(false);
  const [analyzed, setAnalyzed] = useState(false);
  const [lastRun, setLastRun] = useState(null);

  const calc = useMemo(() => {
    const c1a = mvrvZ <= 0.3;
    const c1b = puell < 2.0;
    const observation = c1a && c1b;
    const c1c = hashRibbonCapitulation;
    const stage1 = observation && c1c;
    const c2a = puell < 0.5 || reserveRisk < 0.002;
    const c2b = zvwap < -1.5;
    const stage2 = stage1 && c2a && c2b;
    const c3a = sthLthGap <= 0.15;
    const c3b = soprLth <= 1.0 && soprSustained;
    const c3c = hashRibbonCrossover;
    const stage3 = stage2 && c3a && c3b && c3c;
    const activeStage = stage3 ? 4 : stage2 ? 3 : stage1 ? 2 : observation ? 1 : 0;
    const capitalPct = { 0: 0, 1: 0, 2: 20, 3: 50, 4: 100 }[activeStage];

    const belowCost = btcPrice < minerCost;
    const minerStructuralSignal = belowCost && hashRibbonCrossover
      ? "strong"
      : belowCost && hashRibbonCapitulation
      ? "watch"
      : "none";

    const lights = [
      { label: "Zona di osservazione (Z ≤ 0.3 e Puell < 2)", state: observation ? "green" : (c1a || c1b) ? "orange" : "red" },
      { label: "Capitolazione mineraria confermata", state: hashRibbonCapitulation ? "green" : belowCost ? "orange" : "red" },
      { label: "Stress minerario profondo (Puell < 0.5)", state: puell < 0.5 ? "green" : puell < 1.0 ? "orange" : "red" },
      { label: "zVWAP estremo (< -1.5)", state: zvwap < -1.5 ? "green" : zvwap < -0.5 ? "orange" : "red" },
      { label: "Crossover di recupero confermato", state: hashRibbonCrossover ? "green" : hashRibbonCapitulation ? "orange" : "red" },
      { label: "Conferma finale (convergenza + SOPR sostenuto)", state: (c3a && c3b) ? "green" : (c3a || c3b) ? "orange" : "red" },
    ];
    const allGreen = lights.every(l => l.state === "green");

    return { c1a, c1b, c1c, observation, stage1, c2a, c2b, stage2, c3a, c3b, c3c, stage3, activeStage, capitalPct, belowCost, minerStructuralSignal, lights, allGreen };
  }, [mvrvZ, puell, reserveRisk, zvwap, soprLth, sthLthGap, soprSustained, btcPrice, minerCost, hashRibbonCapitulation, hashRibbonCrossover]);

  const minerSignalCopy = {
    strong: { label: "Segnale forte — capitolazione mineraria conclusa, prezzo sotto costo", color: COLORS.tealBright },
    watch: { label: "Capitolazione mineraria in corso — attendi il crossover Hash Ribbon", color: COLORS.amber },
    none: { label: "Nessuno stress strutturale sui miner al momento", color: COLORS.mutedDim },
  };

  const stageLabels = {
    0: "Fuori zona — nessuna condizione attiva",
    1: "Zona di osservazione — monitorare, nessun capitale ancora",
    2: "Stadio 1 — capitolazione mineraria confermata, primo ingresso",
    3: "Stadio 2 — stress minerario profondo, incremento posizione",
    4: "Stadio 3 — capitolazione completa confermata, posizione piena",
  };

  return (
    <div style={{ backgroundColor: COLORS.bgDeep, minHeight: "100vh", fontFamily: "'Inter', sans-serif", width: "100%", paddingBottom: "64px" }}>
      <div style={{ padding: "32px 24px 24px", maxWidth: "1000px", margin: "0 auto" }}>
        <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "4px" }}>
          <div style={{ width: "6px", height: "6px", backgroundColor: COLORS.tealBright, borderRadius: "1px" }} />
          <span style={{ color: COLORS.mutedDim, fontFamily: "'IBM Plex Mono', monospace", fontSize: "12px", textTransform: "uppercase", letterSpacing: "0.1em" }}>On-chain · BTC</span>
        </div>
        <h1 style={{ color: COLORS.ink, fontFamily: "'Space Grotesk', sans-serif", fontSize: "28px", fontWeight: 700, margin: "4px 0" }}>Console di Accumulazione</h1>
        <p style={{ color: COLORS.muted, fontSize: "14px", marginTop: "6px", maxWidth: "560px" }}>
          MVRV Z-Score e Puell Multiple precaricati da ricerca web (dato 1-2 lug 2026). Reserve Risk, zVWAP e SOPR restano da leggere tu dal grafico — aggiorna pure ogni valore.
        </p>
      </div>

      <div style={{ padding: "0 24px", maxWidth: "1000px", margin: "0 auto", display: "grid", gridTemplateColumns: window.innerWidth > 1024 ? "280px 1fr" : "1fr", gap: "24px" }}>
        <div style={{ borderRadius: "8px", padding: "24px", display: "flex", justifyContent: "center", backgroundColor: COLORS.bgPanel, border: `1px solid ${COLORS.border}` }}>
          <Gauge mvrvZ={mvrvZ} />
        </div>

        <div style={{ borderRadius: "8px", overflow: "hidden", backgroundColor: COLORS.bgPanel, border: `1px solid ${COLORS.border}` }}>
          <div style={{ padding: "16px 16px 8px" }}>
            <span style={{ fontFamily: "'Space Grotesk', sans-serif", color: COLORS.ink, fontSize: "14px", fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.03em" }}>Letture attuali</span>
          </div>
          <IndicatorRow label="MVRV Z-Score" value={mvrvZ} onChange={setMvrvZ} unit="score" pass={calc.c1a} thresholdLabel="soglia: ≤ 0.3 (rivista dopo backtest)" />
          <IndicatorRow label="Puell Multiple" value={puell} onChange={setPuell} unit="×" pass={calc.c1b} thresholdLabel="attenzione: < 2.0 · confermato: < 0.5" />
          <IndicatorRow label="Reserve Risk" value={reserveRisk} onChange={setReserveRisk} unit="ratio" step="0.0001" pass={reserveRisk < 0.002} thresholdLabel="soglia: < 0.002" />
          <IndicatorRow label="zVWAP (ancorato a max ciclo)" value={zvwap} onChange={setZvwap} unit="σ" pass={calc.c2b} thresholdLabel="soglia: < -1.5" />
          <IndicatorRow label="SOPR (long-term holder)" value={soprLth} onChange={setSoprLth} unit="ratio" pass={soprLth <= 1.0} thresholdLabel="soglia: ≤ 1.0" />
          <IndicatorRow label="Gap STH-MVRV / LTH-MVRV" value={sthLthGap} onChange={setSthLthGap} unit="Δ" pass={calc.c3a} thresholdLabel="soglia: ≤ 0.15 (convergenza)" />
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 16px" }}>
            <span style={{ color: COLORS.ink, fontSize: "14px", fontWeight: 500 }}>SOPR ≤ 1 sostenuto da 3+ settimane</span>
            <button onClick={() => setSoprSustained(!soprSustained)} style={{ backgroundColor: soprSustained ? COLORS.teal : COLORS.bgDeep, border: `1px solid ${soprSustained ? COLORS.teal : COLORS.border}`, width: "44px", height: "24px", borderRadius: "12px", position: "relative", cursor: "pointer" }}>
              <div style={{ backgroundColor: COLORS.ink, width: "16px", height: "16px", borderRadius: "50%", position: "absolute", top: "3px", left: soprSustained ? "22px" : "3px", transition: "left 0.15s" }} />
            </button>
          </div>
        </div>
      </div>

      <div style={{ padding: "0 24px", maxWidth: "1000px", margin: "20px auto 0" }}>
        <div style={{ borderRadius: "8px", overflow: "hidden", backgroundColor: COLORS.bgPanel, border: `1px solid ${COLORS.border}` }}>
          <div style={{ padding: "16px 16px 4px" }}>
            <span style={{ fontFamily: "'Space Grotesk', sans-serif", color: COLORS.ink, fontSize: "14px", fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.03em" }}>Costo di produzione minerario · struttura, non ciclo</span>
            <p style={{ color: COLORS.mutedDim, fontSize: "11px", marginTop: "4px", lineHeight: 1.5 }}>
              Ancoraggio economico indipendente dai cicli storici: quando il prezzo scende sotto il costo reale di estrazione, i miner meno efficienti sono forzati a vendere — pressione che storicamente si esaurisce in fretta.
            </p>
          </div>
          <IndicatorRow label="Prezzo BTC attuale" value={btcPrice} onChange={setBtcPrice} unit="$" step="100" pass={calc.belowCost} thresholdLabel="confronto diretto col costo di produzione" />
          <IndicatorRow label="Costo di produzione stimato" value={minerCost} onChange={setMinerCost} unit="$" step="100" thresholdLabel="CoinShares 2024: ~$37.856 · ricalcola periodicamente" />
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 16px", borderBottom: `1px solid ${COLORS.border}` }}>
            <span style={{ color: COLORS.ink, fontSize: "13px", fontWeight: 500 }}>Hash Ribbon in capitolazione (MA30 hash rate &lt; MA60)</span>
            <button onClick={() => { setHashRibbonCapitulation(!hashRibbonCapitulation); if (!hashRibbonCapitulation) setHashRibbonCrossover(false); }} style={{ backgroundColor: hashRibbonCapitulation ? COLORS.amber : COLORS.bgDeep, border: `1px solid ${hashRibbonCapitulation ? COLORS.amber : COLORS.border}`, width: "44px", height: "24px", borderRadius: "12px", position: "relative", cursor: "pointer", flexShrink: 0 }}>
              <div style={{ backgroundColor: COLORS.ink, width: "16px", height: "16px", borderRadius: "50%", position: "absolute", top: "3px", left: hashRibbonCapitulation ? "22px" : "3px", transition: "left 0.15s" }} />
            </button>
          </div>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 16px" }}>
            <span style={{ color: COLORS.ink, fontSize: "13px", fontWeight: 500 }}>Crossover di recupero confermato (MA30 &gt; MA60)</span>
            <button onClick={() => { setHashRibbonCrossover(!hashRibbonCrossover); if (!hashRibbonCrossover) setHashRibbonCapitulation(false); }} style={{ backgroundColor: hashRibbonCrossover ? COLORS.teal : COLORS.bgDeep, border: `1px solid ${hashRibbonCrossover ? COLORS.teal : COLORS.border}`, width: "44px", height: "24px", borderRadius: "12px", position: "relative", cursor: "pointer", flexShrink: 0 }}>
              <div style={{ backgroundColor: COLORS.ink, width: "16px", height: "16px", borderRadius: "50%", position: "absolute", top: "3px", left: hashRibbonCrossover ? "22px" : "3px", transition: "left 0.15s" }} />
            </button>
          </div>
          <div style={{ padding: "12px 16px" }}>
            <span style={{ fontFamily: "'Space Grotesk', sans-serif", color: minerSignalCopy[calc.minerStructuralSignal].color, fontSize: "13px", fontWeight: 600 }}>
              {minerSignalCopy[calc.minerStructuralSignal].label}
            </span>
          </div>
        </div>
      </div>

      <div style={{ padding: "0 24px", maxWidth: "1000px", margin: "24px auto 0", display: "flex", flexDirection: "column", alignItems: "center", gap: "8px" }}>
        <button
          onClick={() => { setAnalyzed(true); setLastRun(new Date().toLocaleTimeString("it-IT")); }}
          style={{
            backgroundColor: COLORS.teal, color: COLORS.bgDeep, border: "none", borderRadius: "10px",
            padding: "16px 40px", fontFamily: "'Space Grotesk', sans-serif", fontWeight: 700, fontSize: "16px",
            letterSpacing: "0.02em", cursor: "pointer", boxShadow: "0 0 20px 2px rgba(79,182,168,0.35)", width: "100%", maxWidth: "360px"
          }}
        >
          {analyzed ? "🔄 Rianalizza" : "▶ Avvia Analisi"}
        </button>
        {lastRun && (
          <span style={{ color: COLORS.mutedDim, fontFamily: "'IBM Plex Mono', monospace", fontSize: "11px" }}>
            ultima analisi: {lastRun}
          </span>
        )}
      </div>

      {!analyzed && (
        <div style={{ padding: "0 24px", maxWidth: "1000px", margin: "20px auto 0" }}>
          <div style={{ borderRadius: "8px", padding: "24px", textAlign: "center", backgroundColor: COLORS.bgPanelAlt, border: `1px dashed ${COLORS.border}` }}>
            <span style={{ color: COLORS.mutedDim, fontFamily: "'Inter', sans-serif", fontSize: "13px" }}>
              Controlla i valori inseriti sopra, poi premi "Avvia Analisi" per vedere gauge, semafori e stadio di accumulo.
            </span>
          </div>
        </div>
      )}

      {analyzed && (
      <>
      <div style={{ padding: "0 24px", maxWidth: "1000px", margin: "20px auto 0" }}>
        <div style={{ borderRadius: "8px", overflow: "hidden", backgroundColor: COLORS.bgPanel, border: `1px solid ${calc.allGreen && calc.activeStage >= 1 ? COLORS.teal : COLORS.border}` }}>
          <div style={{ padding: "16px 16px 4px" }}>
            <span style={{ fontFamily: "'Space Grotesk', sans-serif", color: COLORS.ink, fontSize: "14px", fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.03em" }}>Semafori di confluenza</span>
            <p style={{ color: COLORS.mutedDim, fontSize: "11px", marginTop: "4px", lineHeight: 1.5 }}>
              Tutti verdi + posizione nella zona di accumulo del gauge → vai a fare l'analisi tecnica e valuta l'ingresso.
            </p>
          </div>
          <div style={{ padding: "4px 16px 12px" }}>
            {calc.lights.map((l, i) => <TrafficLight key={i} label={l.label} state={l.state} />)}
          </div>
          {calc.allGreen && calc.activeStage >= 1 && (
            <div style={{ padding: "12px 16px", backgroundColor: "rgba(79,182,168,0.12)", borderTop: `1px solid ${COLORS.teal}` }}>
              <span style={{ fontFamily: "'Space Grotesk', sans-serif", color: COLORS.tealBright, fontSize: "13px", fontWeight: 600 }}>
                🟢 Tutti i semafori sono verdi — zona di accumulo confermata da confluenza. Momento di passare all'analisi tecnica.
              </span>
            </div>
          )}
        </div>
      </div>

      <div style={{ padding: "0 24px", maxWidth: "1000px", margin: "24px auto 0" }}>
        <div style={{ borderRadius: "8px", padding: "16px 20px", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: "12px", backgroundColor: calc.activeStage > 0 ? "rgba(79,182,168,0.10)" : COLORS.bgPanelAlt, border: `1px solid ${calc.activeStage > 0 ? COLORS.teal : COLORS.border}` }}>
          <span style={{ fontFamily: "'Space Grotesk', sans-serif", color: COLORS.ink, fontSize: "16px", fontWeight: 600 }}>{stageLabels[calc.activeStage]}</span>
          <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
            <span style={{ color: COLORS.muted, fontSize: "12px" }}>capitale suggerito</span>
            <span style={{ fontFamily: "'IBM Plex Mono', monospace", color: COLORS.tealBright, fontSize: "20px", fontWeight: 600 }}>{calc.capitalPct}%</span>
          </div>
        </div>
      </div>

      <div style={{ padding: "0 24px", maxWidth: "1000px", margin: "16px auto 0", display: "flex", flexDirection: window.innerWidth > 900 ? "row" : "column", gap: "12px" }}>
        <StageCard number={0} title="Osservazione" capitalPct={0} active={calc.activeStage === 1} conditions={[{ label: "MVRV Z-Score ≤ 0.3", met: calc.c1a }, { label: "Puell Multiple < 2.0", met: calc.c1b }]} />
        <StageCard number={1} title="Prima tranche" capitalPct={20} active={calc.activeStage === 2} conditions={[{ label: "Osservazione attiva", met: calc.observation }, { label: "Capitolazione mineraria confermata", met: calc.c1c }]} />
        <StageCard number={2} title="Accumulo confermato" capitalPct={50} active={calc.activeStage === 3} conditions={[{ label: "Stadio 1 attivo", met: calc.stage1 }, { label: "Puell < 0.5 o Reserve Risk < 0.002", met: calc.c2a }, { label: "zVWAP < -1.5", met: calc.c2b }]} />
        <StageCard number={3} title="Capitolazione confermata" capitalPct={100} active={calc.activeStage === 4} conditions={[{ label: "Stadio 2 attivo", met: calc.stage2 }, { label: "Crossover Hash Ribbon", met: calc.c3c }, { label: "Convergenza STH/LTH-MVRV", met: calc.c3a }, { label: "SOPR LTH ≤ 1 sostenuto", met: calc.c3b }]} />
      </div>
      </>
      )}

      <div style={{ padding: "0 24px", maxWidth: "1000px", margin: "24px auto 0" }}>
        <p style={{ color: COLORS.mutedDim, fontSize: "12px", lineHeight: 1.6 }}>
          ⓘ Console di supporto alla decisione, non un segnale automatico di trading. Le soglie derivano da pattern osservati nei cicli 2011–2022 e restano un'ipotesi di lavoro, non una garanzia sui cicli futuri. Il costo di produzione minerario va ricalcolato periodicamente (cambia con efficienza hardware e difficulty di rete) — verificalo su fonti come CoinShares Mining Report o Hashrate Index. Aggiorna gli altri valori manualmente consultando charts.checkonchain.com o Glassnode Studio.
        </p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AccumulationConsole />);
</script>
</body>
</html>
