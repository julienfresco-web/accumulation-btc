<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Zona di Accumulo BTC — Console di analisi del ciclo on-chain</title>
<meta name="description" content="La console che legge il ciclo di Bitcoin: 16 metriche on-chain, un verdetto giornaliero. Backtest completo 2011–2026."/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A1420; --panel:#101B2D; --panel2:#0D1826; --bordo:#1E2E42;
  --ink:#E7EDF3; --muto:#7C8A9C; --amber:#D8A34E; --teal:#4FB6A8; --tealb:#8FE3D2; --coral:#C1543D;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:Inter,sans-serif;line-height:1.6}
h1,h2,h3{font-family:'Space Grotesk',sans-serif}
.mono{font-family:'IBM Plex Mono',monospace}
.wrap{max-width:1080px;margin:0 auto;padding:0 22px}
.vetro{background:rgba(16,27,45,.72);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border:1px solid var(--bordo);border-radius:16px}

/* barra */
nav{position:sticky;top:0;z-index:50;background:rgba(10,20,32,.85);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--bordo)}
nav .wrap{display:flex;align-items:center;justify-content:space-between;height:62px}
.brand{font-family:'Space Grotesk';font-weight:700;font-size:17px;color:var(--amber);letter-spacing:.4px}
.lingue button{background:none;border:1px solid var(--bordo);color:var(--muto);padding:5px 11px;
  border-radius:8px;cursor:pointer;font-size:13px;margin-left:6px;font-family:'IBM Plex Mono'}
.lingue button.attiva{color:var(--bg);background:var(--amber);border-color:var(--amber);font-weight:600}

/* hero */
.hero{padding:88px 0 66px;text-align:center;background:
  radial-gradient(ellipse 60% 50% at 50% 0%, rgba(216,163,78,.10), transparent)}
.hero h1{font-size:clamp(30px,5vw,52px);line-height:1.15;max-width:820px;margin:0 auto 20px}
.hero h1 em{color:var(--amber);font-style:normal}
.hero p{color:var(--muto);font-size:18px;max-width:640px;margin:0 auto 34px}
.cta{display:inline-block;background:var(--amber);color:var(--bg);font-weight:700;font-size:17px;
  padding:15px 38px;border-radius:12px;text-decoration:none;font-family:'Space Grotesk';
  box-shadow:0 6px 28px rgba(216,163,78,.30)}
.cta:hover{filter:brightness(1.08)}
.sotto-cta{color:var(--muto);font-size:13px;margin-top:14px}

/* sezioni */
section{padding:72px 0}
.etichetta{color:var(--teal);font-family:'IBM Plex Mono';font-size:13px;letter-spacing:2px;
  text-transform:uppercase;margin-bottom:10px}
h2{font-size:clamp(24px,3.4vw,34px);margin-bottom:14px}
.intro-sez{color:var(--muto);max-width:680px;margin-bottom:38px}

/* card */
.griglia3{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px}
.card{padding:28px}
.card .num{font-family:'IBM Plex Mono';font-size:30px;color:var(--amber);font-weight:600}
.card h3{font-size:18px;margin:10px 0 8px}
.card p{color:var(--muto);font-size:14.5px}

/* roadmap fasce */
.fasce{display:flex;flex-direction:column;gap:10px;margin-top:8px}
.fascia{display:flex;align-items:center;gap:16px;padding:16px 20px;border-radius:12px;
  border:1px solid var(--bordo);background:var(--panel2)}
.fascia .pallino{width:14px;height:14px;border-radius:4px;transform:rotate(45deg);flex-shrink:0}
.fascia .nome{font-family:'Space Grotesk';font-weight:600;min-width:190px}
.fascia .desc{color:var(--muto);font-size:14px}
.fascia .soglia{margin-left:auto;font-family:'IBM Plex Mono';font-size:13px;color:var(--muto);white-space:nowrap}

/* backtest */
.grafico-grande{width:100%;border-radius:14px;border:1px solid var(--bordo);display:block}
.stat-riga{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin:26px 0 36px}
.stat{padding:20px;text-align:center}
.stat .v{font-family:'IBM Plex Mono';font-size:24px;color:var(--tealb);font-weight:600}
.stat .l{color:var(--muto);font-size:13px;margin-top:4px}
.galleria{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;margin-top:10px}
.galleria figure img{width:100%;border-radius:12px;border:1px solid var(--bordo);display:block}
.galleria figcaption{color:var(--muto);font-size:13px;margin-top:8px;font-family:'IBM Plex Mono'}

/* prezzo */
.prezzo-box{max-width:520px;margin:0 auto;padding:42px;text-align:center}
.prezzo-box .cifra{font-family:'IBM Plex Mono';font-size:46px;color:var(--amber);font-weight:600}
.prezzo-box ul{list-style:none;margin:22px 0 30px;text-align:left}
.prezzo-box li{padding:7px 0;color:var(--ink);font-size:15px}
.prezzo-box li::before{content:"◆";color:var(--teal);margin-right:10px;font-size:11px}

/* disclaimer + footer */
.disclaimer{border-left:3px solid var(--coral);padding:22px 26px;background:var(--panel2);
  border-radius:0 12px 12px 0;color:var(--muto);font-size:13.5px}
footer{border-top:1px solid var(--bordo);padding:34px 0;color:var(--muto);font-size:13px}
footer .wrap{display:flex;flex-wrap:wrap;gap:18px;justify-content:space-between;align-items:center}
footer a{color:var(--teal);text-decoration:none;margin-right:18px}
@media(max-width:640px){.fascia{flex-wrap:wrap}.fascia .soglia{margin-left:30px}}
</style>
</head>
<body>

<section id="prezzo"><div class="wrap">
